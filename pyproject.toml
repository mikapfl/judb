[project]
name = "judb"
version = "0.1.0"
description = "A visual debugger for datascience — pudb-style stepping with a notebook-style rich console that runs in the paused frame."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ipython>=8.0",
    "matplotlib>=3.7",
    "matplotlib-inline>=0.1.6",
    "numpy>=1.24",
    "pandas>=2.0",
    "pre-commit>=4.6.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.15.22",
    "ty>=0.0.1a1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["judb"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ty.rules]
missing-type-argument = "error"
possibly-unresolved-reference = "warn"

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
extend-select = ["ANN", "PYI"]
preview = true

[tool.ruff.lint.per-file-ignores]
# Test functions don't need return type annotations.
"tests/**" = ["ANN201"]
