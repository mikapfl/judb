name: Release

# Manual only — releases are never triggered by a push or a tag.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Index to publish to"
        type: choice
        options: [testpypi, pypi]
        default: testpypi
        required: true
      bump:
        description: "Version bump (pypi target only; 'none' releases the version already in pyproject.toml)"
        type: choice
        options: [none, patch, minor, major]
        default: patch
        required: true

permissions:
  contents: read

jobs:
  prepare:
    name: version + changelog
    runs-on: ubuntu-latest
    # The only job that writes to the repository: it commits the built
    # changelog back. Kept separate so the heavier build/publish jobs stay
    # read-only.
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true

      - name: Bump version, build the changelog, commit
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ inputs.bump }}" != "none" ]; then
            # --no-sync skips rebuilding the venv but still re-locks, so uv.lock
            # tracks the new version. Skipping the re-lock (--frozen) would
            # leave the lock stale and fail the `uv-lock` check on the next run.
            uv version --bump "${{ inputs.bump }}" --no-sync
          fi
          # Read back from pyproject.toml, the authoritative source after a bump.
          version=$(python3 scripts/release_notes.py version)
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # A dry run applies the bump too — so it publishes the version the
          # real release *will* produce, not the last released one, which the
          # index would reject as a duplicate. But it commits nothing: the bump
          # and the fragments are both still needed for the real run. The build
          # job re-applies this version from the output.
          if [ "${{ inputs.target }}" != "pypi" ]; then
            echo "Dry run of judb $version — nothing committed."
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Releasing judb $version to pypi"

          # Idempotent: a re-run after a mid-release failure must not rebuild a
          # changelog section that already exists.
          if python3 scripts/release_notes.py notes >/dev/null 2>&1; then
            echo "CHANGELOG.md already has a section for $version — reusing it."
          elif [ -z "$(find changelog.d -name '*.md' ! -name 'README.md' -print -quit)" ]; then
            # Refuse to release with nothing to tell users. `README.md` is the
            # instructions file in changelog.d/, not a fragment.
            echo "::error::No changelog fragments, and CHANGELOG.md has no section for $version."
            exit 1
          else
            # Consumes the fragments (towncrier `git rm`s them) and writes the
            # section that becomes the draft release body.
            uv run towncrier build --yes --version "$version"
          fi

          # One commit carrying the bump and the changelog — or none at all, if
          # `bump: none` was re-run over an already-prepared tree.
          if [ -z "$(git status --porcelain)" ]; then
            echo "Nothing to commit; releasing the existing commit."
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v$version"
          git push origin "HEAD:${{ github.ref_name }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: build + verify artifacts
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      # Build from the commit that carries the freshly-built changelog, so the
      # artifacts, the tag and the release notes all describe the same tree.
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      # Building the sdist runs the hatch hook, which builds the frontend
      # bundle; the sdist then ships it so installing needs no Node.
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      # Pin the version being released. For a `pypi` run the checked-out commit
      # already carries it and this is a no-op; for a dry run it applies the
      # bump that `prepare` computed but deliberately did not commit.
      - run: uv version "${{ needs.prepare.outputs.version }}" --no-sync

      # Never ship an untested tree, even though CI covers main.
      - run: uv sync
      - run: uv run pytest -q

      # Builds wheel + sdist into dist/, installs *each* into a fresh venv and
      # runs a headless pause -> plot -> continue round-trip against it.
      - run: ./scripts/smoke_install.sh

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to ${{ inputs.target }}
    needs: build
    runs-on: ubuntu-latest
    # Named per target so PyPI releases can require a reviewer in the repo's
    # environment protection rules, while Test-PyPI stays friction-free.
    environment: ${{ inputs.target }}
    permissions:
      # Trusted Publishing (OIDC): no API token stored in the repo. Configure a
      # publisher for this workflow on the index first, or the upload is denied.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to Test-PyPI
        if: inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: tag + draft GitHub release
    needs: [prepare, publish]
    # Real releases only: a Test-PyPI dry run must not tag the repository.
    if: inputs.target == 'pypi'
    runs-on: ubuntu-latest
    permissions:
      # Push the tag and create the release.
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # Tag explicitly rather than letting the release create it: a draft
      # release does not create its tag until published, and we want the exact
      # commit that produced the uploaded artifacts pinned right away.
      - name: Tag the release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "judb $VERSION"
          git push origin "v$VERSION"

      # Draft, not published: you review it and press the button. Body is the
      # real CHANGELOG.md section, so the release notes and the changelog can
      # never drift apart. The built wheel + sdist are attached.
      - name: Create the draft GitHub release
        run: |
          set -euo pipefail
          python3 scripts/release_notes.py notes > /tmp/notes.md
          gh release create "v$VERSION" \
            --draft \
            --title "judb $VERSION" \
            --notes-file /tmp/notes.md \
            dist/*
          echo "Draft release created — review and publish it at:"
          echo "  https://github.com/${{ github.repository }}/releases"
